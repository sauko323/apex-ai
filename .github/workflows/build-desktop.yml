name: Build APEX AI Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apex-desktop
        run: npm install

      - name: Copy app file
        run: copy apex-ai.html apex-desktop\apex-ai.html

      - name: Build Windows installer
        working-directory: apex-desktop
        run: npx electron-builder --win --publish never

      - name: List dist folder
        run: dir apex-desktop\dist\ || echo dist empty

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: APEX-AI-Windows
          path: apex-desktop/dist/*.exe
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apex-desktop
        run: npm install

      - name: Copy app file
        run: cp apex-ai.html apex-desktop/apex-ai.html

      - name: Build Mac DMG
        working-directory: apex-desktop
        run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List dist folder
        run: ls -la apex-desktop/dist/ || echo "dist folder empty or missing"

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: APEX-AI-Mac
          path: apex-desktop/dist/*.zip
          if-no-files-found: warn

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            APEX-AI-Windows/**/*.exe
            APEX-AI-Mac/**/*.dmg
          body: |
            ## APEX AI Desktop App

            ### Download
            - **Windows**: Download the `.exe` installer — run it and follow the setup wizard
            - **Mac**: Download the `.dmg` — open it and drag APEX AI to Applications

            ### Console Setup (PS5/Xbox)
            Open APEX AI after installing. The tray icon shows your PC's IP address.
            Enter this IP once in your game's telemetry settings:

            | Game | Platform | Where to set it |
            |------|----------|-----------------|
            | F1 24 / F1 25 | PS5, Xbox, PC | Settings → Telemetry → UDP Output On |
            | Gran Turismo 7 | PS5 | Options → Others → Send Data = On |
            | Forza Motorsport | Xbox, PC | Settings → HUD → Data Out = On |
            | WRC | PS5, Xbox, PC | Settings → Advanced → Telemetry |
            | iRacing, ACC, AC, rFactor 2, LMU | PC only | Auto-detected, no setup needed |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
