name: Build APEX AI Desktop App

on:
  push:
    tags:
      - 'v*'          # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Also allows manual trigger from GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apex-desktop
        run: npm install

      - name: Copy app file
        run: copy apex-ai.html apex-desktop\apex-ai.html

      - name: Build Windows installer
        working-directory: apex-desktop
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: APEX-AI-Windows
          path: apex-desktop/dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: apex-desktop
        run: npm install

      - name: Copy app file
        run: cp apex-ai.html apex-desktop/apex-ai.html

      - name: Build Mac DMG
        working-directory: apex-desktop
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: APEX-AI-Mac
          path: apex-desktop/dist/*.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            APEX-AI-Windows/*.exe
            APEX-AI-Mac/*.dmg
          body: |
            ## APEX AI Desktop App

            ### Download
            - **Windows**: Download the `.exe` installer
            - **Mac**: Download the `.dmg` and drag APEX AI to Applications

            ### Console Setup (PS5/Xbox)
            After installing, open APEX AI and go to **Settings → Console Setup** to see your IP address.
            Enter this IP in your game's telemetry settings.

            **Supported games:**
            | Game | Platform | Setting |
            |------|----------|---------|
            | F1 24 / F1 25 | PS5, Xbox, PC | Settings → Telemetry → UDP Output On, IP = your PC IP |
            | Gran Turismo 7 | PS5 | Options → Others → Send Data = On, IP = your PC IP |
            | Forza Motorsport | Xbox, PC | Settings → HUD → Data Out = On, IP = your PC IP |
            | WRC | PS5, Xbox, PC | Settings → Advanced → Telemetry, IP = your PC IP |
            | iRacing | PC only | Auto-detected |
            | ACC, AC, rFactor 2, LMU | PC only | Auto-detected |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
